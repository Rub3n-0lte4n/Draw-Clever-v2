<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Not Found — Draw Clever</title>
  <meta name="theme-color" content="#0A0908" />
  <link rel="icon" type="image/png" href="/Logo Variants/Logo Mark.png" />
  <!-- Self-contained: a 404 may be served at any path depth, so it must not
       depend on relatively-resolved external CSS. -->
  <style>
    @font-face { font-family: 'Playfair Display SC'; src: url('/Fonts/Playfair_Display_SC/PlayfairDisplaySC-Regular.ttf') format('truetype'); font-weight: 400; font-style: normal; font-display: swap; }
    @font-face { font-family: 'Playfair Display SC'; src: url('/Fonts/Playfair_Display_SC/PlayfairDisplaySC-Italic.ttf') format('truetype'); font-weight: 400; font-style: italic; font-display: swap; }
    @font-face { font-family: 'Playfair Display'; src: url('/Fonts/Playfair_Display/PlayfairDisplay.ttf') format('truetype-variations'), url('/Fonts/Playfair_Display/PlayfairDisplay.ttf') format('truetype'); font-weight: 100 900; font-style: normal; font-display: swap; }
    @font-face { font-family: 'Playfair Display'; src: url('/Fonts/Playfair_Display/PlayfairDisplay-Italic.ttf') format('truetype-variations'), url('/Fonts/Playfair_Display/PlayfairDisplay-Italic.ttf') format('truetype'); font-weight: 100 900; font-style: italic; font-display: swap; }
    @font-face { font-family: 'Inter'; src: url('/Fonts/Inter/Inter.ttf') format('truetype'); font-weight: 100 900; font-style: normal; font-display: swap; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --ink:#0A0908; --text:#F3EEE6; --sub:#B3ABA0; --muted:#6E675C; --line:#211F1B; --champ:#EAD9B0;
      --grad-gold: linear-gradient(102deg,#EAD9B0 0%,#D9BD82 26%,#C8A96A 50%,#B5853F 76%,#9C6B2E 100%); }
    @view-transition { navigation: auto; }
    ::view-transition-old(root) { animation: vt-out .34s cubic-bezier(.16,1,.3,1) both; }
    ::view-transition-new(root) { animation: vt-in .5s cubic-bezier(.16,1,.3,1) both; }
    @keyframes vt-out { to { opacity: 0; transform: translateY(-10px); } }
    @keyframes vt-in { from { opacity: 0; transform: translateY(16px); } }
    @media (prefers-reduced-motion: reduce) { ::view-transition-old(root), ::view-transition-new(root) { animation: none !important; } }
    body { background: var(--ink); color: var(--text); font-family: 'Inter', sans-serif; font-weight: 300; min-height: 100svh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px; -webkit-font-smoothing: antialiased; overflow: hidden; }
    .mark { height: 46px; margin-bottom: 56px; mix-blend-mode: screen; opacity: .9; }
    .code { font-family: 'Playfair Display SC', serif; font-size: clamp(110px, 26vw, 320px); line-height: .82; letter-spacing: -.01em; color: var(--champ); }
    h1 { font-family: 'Playfair Display SC', serif; font-weight: 400; text-transform: none; font-size: clamp(24px, 3.2vw, 38px); letter-spacing: .012em; margin: 28px 0 16px; }
    h1 .i { font-style: italic; color: var(--champ); }
    p { font-size: 14px; color: var(--sub); line-height: 1.8; max-width: 44ch; margin-bottom: 40px; }
    .btn { font-size: 10px; font-weight: 500; letter-spacing: .18em; text-transform: uppercase; text-decoration: none; padding: 15px 34px; border-radius: 100px; background: var(--grad-gold); color: #15110A; transition: transform .3s cubic-bezier(.16,1,.3,1), box-shadow .3s; display: inline-flex; }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 14px 40px rgba(200,169,106,.28); }
    .links { margin-top: 30px; display: flex; gap: 22px; flex-wrap: wrap; justify-content: center; }
    .links a { font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color .3s; }
    .links a:hover { color: #C8A96A; }
  </style>
</head>
<body>
  <img class="mark" src="/Logo Variants/Logo Mark.png" alt="Draw Clever" />
  <div class="code">404</div>
  <h1>This space hasn't<br />been <span class="i">built</span> yet.</h1>
  <p>The page you're looking for has moved, or never existed. Let's return you to something beautifully designed.</p>
  <a href="/" class="btn">Back to Home</a>
  <div class="links">
    <a href="/projects.html">Portfolio</a>
    <a href="/about-us.html">About</a>
    <a href="/services.html">Services</a>
    <a href="/contact.html">Contact</a>
  </div>
</body>
</html>
